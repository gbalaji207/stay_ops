name: stay_ops
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.6+6

environment:
  sdk: ^3.11.0

dependencies:
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  go_router: ^17.2.3
  intl: ^0.20.2
  package_info_plus: ^8.3.0
  shared_preferences: ^2.3.0
  file_selector: ^1.0.3
  share_plus: ^10.1.4
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  image_path_android: "assets/icon/launcher_icon.png"
  android: true
  ios: false
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
  windows:
    generate: false
  macos:
    generate: false
